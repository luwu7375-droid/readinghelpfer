<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper: oklch(97% 0.01 60);
      --ink: oklch(25% 0.01 60);
      --ink-fade: oklch(50% 0.01 60);
      --ink-lighter: oklch(70% 0.01 60);
      --accent: oklch(45% 0.08 30);
      --accent-soft: oklch(92% 0.02 30);
      --divider: oklch(88% 0.005 60);
      --highlight-bg: oklch(88% 0.04 50);
      --shadow: oklch(0% 0 0 / 0.05);
    }

    body.dark {
      --paper: oklch(18% 0.01 60);
      --ink: oklch(88% 0.01 60);
      --ink-fade: oklch(65% 0.01 60);
      --ink-lighter: oklch(50% 0.01 60);
      --accent: oklch(68% 0.08 30);
      --accent-soft: oklch(25% 0.02 30);
      --divider: oklch(28% 0.005 60);
      --highlight-bg: oklch(30% 0.04 50);
      --shadow: oklch(0% 0 0 / 0.2);
    }

    body {
      font-family: 'Noto Serif SC', 'Merriweather', serif;
      background: var(--paper);
      color: var(--ink);
      transition: background 0.4s, color 0.4s;
    }

    .container { display: flex; height: 100vh; }

    .sidebar {
      width: 240px;
      background: var(--paper);
      padding: 32px 20px;
      overflow-y: auto;
      border-right: 1px solid var(--divider);
      position: relative;
    }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .reader {
      flex: 1;
      padding: 48px clamp(60px, 10vw, 140px) 120px;
      overflow-y: auto;
      max-width: 920px;
      margin: 0 auto;
      line-height: 2.1;
      font-size: clamp(16px, 1.1vw, 18px);
      letter-spacing: 0.02em;
    }

    .reader.page-mode {
      height: calc(100vh - 44px);
      overflow-y: hidden !important;
      overflow-x: scroll !important;
      column-count: 2;
      column-gap: 80px;
      column-fill: auto;
      padding: 24px 0;
      width: calc(100% - 160px);
      margin: 0 auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .reader.page-mode::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    @media (max-width: 768px) {
      /* 移动端 page-mode 完整覆盖在下方移动端媒体查询 !important 块里 */
    }

    .reader.page-mode h1 {
      break-inside: avoid;
      break-after: avoid;
    }

    .notes-panel {
      width: 340px;
      background: var(--paper);
      padding: 32px 20px;
      overflow-y: auto;
      border-left: 1px solid var(--divider);
    }

    .theme-toggle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 24px;
      transition: all 0.3s;
    }
    .theme-toggle:hover { transform: rotate(180deg); }

    h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-lighter);
      margin-bottom: 16px;
    }

    h3 {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-lighter);
      margin: 32px 0 12px;
    }

    .book-item {
      padding: 12px 8px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: color 0.2s;
      font-size: 15px;
      color: var(--ink-fade);
      border-left: 2px solid transparent;
      padding-left: 10px;
    }
    .book-item:hover {
      color: var(--ink);
      border-left-color: var(--accent);
    }

    .chapter-item {
      padding: 8px;
      margin-bottom: 2px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink-fade);
      transition: all 0.2s;
      border-radius: 4px;
    }
    .chapter-item:hover { color: var(--ink); }
    .chapter-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }

    .reader h1 {
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 600;
      margin-bottom: 48px;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .reader p {
      margin-bottom: 1.4em;
      color: var(--ink);
      text-indent: 2em;
      position: relative;
      cursor: pointer;
      user-select: text;
      -webkit-user-select: text;
      -webkit-touch-callout: default;
    }

    .reader p:hover::before {
      content: '🔖';
      position: absolute;
      left: -30px;
      opacity: 0.5;
    }

    .bookmark {
      background: linear-gradient(to right, var(--accent-soft) 0%, transparent 100%);
      border-left: 3px solid var(--accent);
      padding-left: 8px;
    }

    .highlight {
      background: linear-gradient(to bottom, transparent 70%, var(--highlight-bg) 70%);
      cursor: pointer;
      padding: 2px 0;
      border-bottom: 1px solid var(--accent);
      transition: all 0.2s;
    }
    .highlight:hover { background: var(--highlight-bg); }

    .highlight-menu {
      position: fixed;
      background: var(--paper);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 8px 32px var(--shadow);
      z-index: 1000;
      border: 1px solid var(--divider);
    }
    .menu-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background 0.2s;
      font-family: inherit;
    }
    .menu-btn:hover { background: var(--accent-soft); }

    .note-card {
      background: var(--paper);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--divider);
      position: relative;
      transition: all 0.2s;
    }
    .note-card:hover {
      box-shadow: 0 4px 16px var(--shadow);
      border-color: var(--accent);
    }
    .note-card:hover .delete-btn { opacity: 1; }

    .note-highlight {
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .note-messages {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-bubble {
      font-size: 13px;
      line-height: 1.7;
      padding: 8px 12px;
      border-radius: 10px;
      white-space: pre-wrap;
      max-width: 92%;
      word-break: break-word;
    }

    .msg-user {
      align-self: flex-end;
      background: var(--accent-soft);
      color: var(--accent);
      border-bottom-right-radius: 3px;
    }

    .msg-ai {
      align-self: flex-start;
      background: var(--divider);
      color: var(--ink);
      border-bottom-left-radius: 3px;
    }

    .msg-label {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--ink-lighter);
      margin-bottom: 2px;
    }

    .msg-user-wrap { align-self: flex-end; display: flex; flex-direction: column; align-items: flex-end; max-width: 92%; }
    .msg-ai-wrap   { align-self: flex-start; display: flex; flex-direction: column; align-items: flex-start; max-width: 92%; }

    .note-time {
      color: var(--ink-lighter);
      font-size: 11px;
      margin-top: 12px;
      letter-spacing: 0.03em;
    }

    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--ink-lighter);
      color: var(--paper);
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      opacity: 0;
      transition: all 0.2s;
      font-family: inherit;
    }
    .delete-btn:hover {
      background: var(--accent);
      transform: scale(1.1);
    }

    button.save-btn {
      background: var(--accent);
      color: var(--paper);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 0.05em;
    }
    button.save-btn:hover {
      background: var(--ink);
      transform: translateY(-1px);
    }

    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .empty-state {
      color: var(--ink-lighter);
      text-align: center;
      padding: 60px 20px;
      font-size: 14px;
      font-style: italic;
    }

    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 20px;
      color: var(--ink-lighter);
      font-size: 14px;
    }
    .reader-loading-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--divider);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .reader-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 80px 20px;
      color: var(--ink-fade);
      font-size: 14px;
      text-align: center;
    }

    /* ─── 移动端适配 ─────────────────────────────────── */

    /* 顶部书名栏（桌面+移动端共用） */
    .reading-topbar {
      display: flex;
      align-items: center;
      height: 44px;
      padding: 0 20px;
      background: var(--paper);
      border-bottom: 1px solid var(--divider);
      font-size: 14px;
      color: var(--ink-fade);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex-shrink: 0;
      gap: 6px;
    }
    .reading-topbar .rt-book {
      font-weight: 600;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 40%;
    }
    .reading-topbar .rt-sep {
      color: var(--ink-lighter);
      flex-shrink: 0;
    }
    .reading-topbar .rt-chapter {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* 顶部导航栏（移动端专用，桌面默认隐藏） */
    .mobile-topbar {
      display: none;
    }

    /* 抽屉遮罩 */
    .drawer-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 400;
    }
    .drawer-mask.active { display: block; }

    @media (max-width: 768px) {

      /* 顶部栏 */
      .mobile-topbar {
        display: flex;
        align-items: center;
        height: 48px;
        padding: 0 12px;
        background: var(--paper);
        border-bottom: 1px solid var(--divider);
        position: sticky;
        top: 0;
        z-index: 300;
        gap: 8px;
      }
      .mobile-topbar .tb-btn {
        background: none;
        border: none;
        color: var(--ink);
        font-size: 22px;
        cursor: pointer;
        padding: 6px 8px;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-family: inherit;
      }
      .mobile-topbar .tb-btn:active { background: var(--accent-soft); }
      .mobile-topbar .tb-title {
        flex: 1;
        text-align: center;
        font-size: 15px;
        color: var(--ink);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      /* 三栏布局改为单列 */
      .container {
        display: block;
        height: auto;
      }

      /* sidebar → 左侧抽屉 */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 80vw;
        max-width: 320px;
        z-index: 500;
        transform: translateX(-100%);
        transition: transform 0.28s ease;
        overflow-y: auto;
        border-right: 1px solid var(--divider);
        padding: 24px 16px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
      }
      .sidebar.open { transform: translateX(0); }

      /* notes-panel → 右侧抽屉 */
      .notes-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 92vw;
        max-width: 380px;
        z-index: 500;
        transform: translateX(100%);
        transition: transform 0.28s ease;
        overflow-y: auto;
        border-left: 1px solid var(--divider);
        padding: 0;
        padding-bottom: env(safe-area-inset-bottom);
      }
      .notes-panel.open { transform: translateX(0); }

      /* 笔记面板顶部固定操作栏 */
      .notes-header {
        position: sticky;
        top: 0;
        background: var(--paper);
        padding: 12px 16px;
        z-index: 10;
        border-bottom: 1px solid var(--divider);
      }

      /* 笔记列表区域内边距 */
      #notesList {
        padding: 12px 16px;
      }

      /* main 区域撑满 */
      .main {
        display: block;
        min-height: 100dvh;
      }
      /* 移动端隐藏桌面书名栏 */
      .reading-topbar {
        display: none !important;
      }

      /* reader：全宽，滚动模式，字号适配 */
      .reader {
        padding: 24px 16px 80px;
        padding-bottom: calc(80px + env(safe-area-inset-bottom));
        max-width: 100%;
        font-size: 17px;
        line-height: 1.9;
        overflow-y: auto;
        min-height: calc(100dvh - 48px);
      }

      /* 移动端 page-mode：单列横向分页
         column-width = viewport - 左右padding(各16px) = 100vw - 32px
         step = column-width + gap = (100vw-32px) + 32px = 100vw = window.innerWidth
         所以 JS getPageStep 在移动端直接返回 window.innerWidth */
      .reader.page-mode {
        column-count: auto !important;
        column-width: calc(100vw - 32px) !important;
        column-gap: 32px !important;
        overflow-x: scroll !important;
        overflow-y: hidden !important;
        height: calc(100dvh - 48px) !important;
        width: 100% !important;
        padding: 24px 16px 80px !important;
        box-sizing: border-box !important;
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
      }
      .reader.page-mode::-webkit-scrollbar { display: none; }

      /* 高亮菜单 → 底部 sheet（移动端） */
      .highlight-menu {
        position: fixed !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        top: auto !important;
        width: 100% !important;
        border-radius: 16px 16px 0 0;
        padding: 12px 8px calc(12px + env(safe-area-inset-bottom));
        display: flex !important;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        box-shadow: 0 -4px 24px var(--shadow);
        z-index: 600;
        /* 默认隐藏在屏幕底部外 */
        transform: translateY(110%);
        transition: transform 0.25s ease;
      }
      .highlight-menu.mobile-visible {
        transform: translateY(0) !important;
      }
      .highlight-menu .menu-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        min-width: 80px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        background: var(--accent-soft);
        color: var(--accent);
        width: auto;
        text-align: center;
      }

      /* 弹窗适配 */
      #settingsDialog > div,
      #inputDialog > div,
      #exportDialog > div,
      #readingSettingsDialog > div {
        width: 92vw !important;
        max-height: 85dvh !important;
        overflow-y: auto !important;
      }

      /* 笔记卡片宽度适配 */
      .note-card {
        padding: 14px 12px;
      }

      /* 登录弹窗适配 */
      #authOverlay > div {
        width: 92vw !important;
        padding: 24px 16px !important;
      }
    }
  </style>
</head>
<body>
  <div id="authOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--paper);z-index:9999;align-items:center;justify-content:center;">
    <div style="width:360px;padding:32px;border:1px solid var(--divider);border-radius:8px;">
      <h3 style="margin-bottom:24px;color:var(--ink);text-align:center;" id="authTitle">登录</h3>
      <div style="margin-bottom:12px;">
        <input id="authEmail" type="email" placeholder="邮箱" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div style="margin-bottom:16px;">
        <input id="authPassword" type="password" placeholder="密码" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div id="authInviteWrap" style="display:none;margin-bottom:16px;">
        <input id="authInviteCode" type="text" placeholder="邀请码" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div id="authError" style="display:none;margin-bottom:12px;padding:8px;border-radius:4px;background:oklch(92% 0.08 30);color:oklch(45% 0.12 30);font-size:13px;"></div>
      <div style="display:flex;gap:8px;">
        <button class="save-btn" onclick="submitAuth()" style="flex:1;" id="authSubmitBtn">登录</button>
        <button class="menu-btn" onclick="toggleAuthMode()" style="flex:1;" id="authToggleBtn">注册</button>
      </div>
    </div>
  </div>
  <!-- 移动端顶部导航栏 -->
  <div class="mobile-topbar" id="mobileTopbar">
    <button class="tb-btn" onclick="openSidebar()" title="书库">☰</button>
    <span class="tb-title" id="mobileTitle">阅读助手</span>
    <button class="tb-btn" onclick="openNotesPanel()" title="笔记">📝</button>
  </div>

  <!-- 抽屉遮罩 -->
  <div class="drawer-mask" id="drawerMask" onclick="closeAllDrawers()"></div>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <!-- 移动端关闭按钮（桌面端靠 display:none 隐藏） -->
      <button id="sidebarCloseBtn" onclick="closeSidebar()" style="display:none;position:absolute;top:12px;right:12px;background:none;border:none;color:var(--ink-fade);font-size:22px;cursor:pointer;padding:4px;line-height:1;">×</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">◐</button>
      <button class="theme-toggle" onclick="openSettings()" title="API 设置" style="margin-left:8px">⚙️</button>
      <button class="theme-toggle" onclick="openReadingSettings()" title="阅读设置" style="margin-left:8px">📖</button>
      <button class="theme-toggle" onclick="logout()" title="退出登录" style="margin-left:8px">⏻</button>
      <h2>书库</h2>
      <input type="file" id="uploadBook" accept=".epub" style="display:none" onchange="uploadBook()">
      <button class="save-btn" onclick="document.getElementById('uploadBook').click()" style="margin-bottom:12px;width:100%">+ 添加书籍</button>
      <div id="bookList"></div>
      <h3>章节</h3>
      <div id="chapterList"></div>
    </div>

    <div class="main">
      <!-- 桌面端书名+章节栏 -->
      <div class="reading-topbar" id="readingTopbar">
        <span class="rt-book" id="topbarBook">阅读助手</span>
        <span class="rt-sep" id="topbarSep" style="display:none;">/</span>
        <span class="rt-chapter" id="topbarChapter"></span>
      </div>
      <div class="reader" id="reader">
        <div class="empty-state">静候书页翻开</div>
      </div>
    </div>

    <div class="notes-panel" id="notesPanel">
      <div class="notes-header">
        <h2>笔记</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="save-btn" onclick="openExportDialog()">导出</button>
          <button class="save-btn" onclick="saveNotes()">保存</button>
          <button id="notesPanelCloseBtn" onclick="closeNotesPanel()" style="display:none;background:none;border:none;color:var(--ink-fade);font-size:22px;cursor:pointer;padding:4px;line-height:1;margin-left:4px;">×</button>
        </div>
      </div>
      <div id="notesList"></div>
    </div>
  </div>

  <div id="settingsDialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:var(--paper);padding:24px;border-radius:8px;width:500px;max-width:90%;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-bottom:16px;color:var(--ink);">API 设置</h3>

      <h4 style="margin:16px 0 12px 0;color:var(--ink);font-size:14px;font-weight:600;">快速阅读模型 (Cheap)</h4>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;color:var(--ink-fade);font-size:13px;">API Key</label>

  <script>
    const API_BASE = window.location.origin;

    /* ─── 移动端工具函数 ─────────────────────────────── */
    function isMobile() { return window.innerWidth <= 768; }

    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('drawerMask').classList.add('active');
      document.getElementById('sidebarCloseBtn').style.display = 'block';
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      const mask = document.getElementById('drawerMask');
      if (!document.getElementById('notesPanel').classList.contains('open')) {
        mask.classList.remove('active');
      }
      document.getElementById('sidebarCloseBtn').style.display = 'none';
    }
    function openNotesPanel() {
      document.getElementById('notesPanel').classList.add('open');
      document.getElementById('drawerMask').classList.add('active');
      document.getElementById('notesPanelCloseBtn').style.display = 'inline-flex';
    }
    function closeNotesPanel() {
      document.getElementById('notesPanel').classList.remove('open');
      const mask = document.getElementById('drawerMask');
      if (!document.getElementById('sidebar').classList.contains('open')) {
        mask.classList.remove('active');
      }
      document.getElementById('notesPanelCloseBtn').style.display = 'none';
    }
    function closeAllDrawers() {
      closeSidebar();
      closeNotesPanel();
      document.getElementById('drawerMask').classList.remove('active');
    }

    // 更新顶部书名栏（桌面 + 移动端）
    function updateTopbar(bookName, chapterTitle) {
      // 桌面端书名栏
      const bookEl = document.getElementById('topbarBook');
      const sepEl = document.getElementById('topbarSep');
      const chapEl = document.getElementById('topbarChapter');
      if (bookEl) bookEl.textContent = bookName || '阅读助手';
      if (chapterTitle) {
        if (sepEl) sepEl.style.display = '';
        if (chapEl) chapEl.textContent = chapterTitle;
      } else {
        if (sepEl) sepEl.style.display = 'none';
        if (chapEl) chapEl.textContent = '';
      }
      // 移动端顶栏
      const titleEl = document.getElementById('mobileTitle');
      if (titleEl) {
        if (bookName && chapterTitle) {
          titleEl.textContent = chapterTitle;
          titleEl.title = `《${bookName}》 / ${chapterTitle}`;
        } else {
          titleEl.textContent = bookName || chapterTitle || '阅读助手';
          titleEl.title = '';
        }
      }
    }

    // 章节加载时关闭 sidebar 并更新顶栏书名
    function mobileOnChapterLoad(bookName, chapterTitle) {
      if (isMobile()) {
        closeSidebar();
      }
      updateTopbar(bookName, chapterTitle);
    }
    /* ─────────────────────────────────────────────────── */

    let authToken = localStorage.getItem('authToken');
    let currentUserId = localStorage.getItem('currentUserId');
    let authMode = 'login';

    async function authFetch(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: { ...options.headers, 'Authorization': `Bearer ${authToken}` }
      });
      if (res.status === 401) {
        localStorage.removeItem('authToken');
        authToken = null;
        currentUserId = null;
        userApiConfig = {};
        document.getElementById('authOverlay').style.display = 'flex';
      }
      return res;
    }

    async function submitAuth() {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const inviteCode = document.getElementById('authInviteCode').value.trim();
      const errEl = document.getElementById('authError');
      errEl.style.display = 'none';
      try {
        const body = { email, password };
        if (authMode === 'register') body.inviteCode = inviteCode;
        const res = await fetch(`${API_BASE}/api/auth/${authMode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { error: text }; }
        if (!res.ok) { errEl.textContent = data.error || text; errEl.style.display = 'block'; return; }
        authToken = data.token;
        currentUserId = String(data.userId);
        localStorage.setItem('authToken', authToken);
        localStorage.setItem('currentUserId', currentUserId);
        document.getElementById('authOverlay').style.display = 'none';
        onLoginSuccess();
      } catch {
        errEl.textContent = '无法连接服务器，请确认服务正在运行'; errEl.style.display = 'block';
      }
    }

    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      document.getElementById('authTitle').textContent = authMode === 'login' ? '登录' : '注册';
      document.getElementById('authSubmitBtn').textContent = authMode === 'login' ? '登录' : '注册';
      document.getElementById('authToggleBtn').textContent = authMode === 'login' ? '注册' : '返回登录';
      document.getElementById('authInviteWrap').style.display = authMode === 'register' ? 'block' : 'none';
      document.getElementById('authInviteCode').value = '';
    }

    document.getElementById('authPassword').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
    let currentBook = null;
    let currentChapter = null;
    let notes = [];
    let selectedText = '';
    let selectedRange = null;
    let progress = {};
    let bookmarks = {};
    let allNotes = {};
    let dialogResolve = null;
    let userApiConfig = {};
    function loadApiConfig() {
      if (!currentUserId) { userApiConfig = {}; return; }
      const stored = JSON.parse(localStorage.getItem(`apiConfig:${currentUserId}`) || '{}');
      // 迁移旧全局 apiConfig（只迁移一次）
      if (!stored.cheap && !stored.main) {
        const legacy = JSON.parse(localStorage.getItem('apiConfig') || '{}');
        if (legacy.cheap || legacy.main) {
          localStorage.setItem(`apiConfig:${currentUserId}`, JSON.stringify(legacy));
          userApiConfig = legacy;
          return;
        }
      }
      userApiConfig = stored;
    }
    loadApiConfig();

    const DEFAULT_READING_SETTINGS = {
      pageMode: 'scroll',
      fontFamily: "'Noto Serif SC', 'Merriweather', serif",
      fontSize: '',
      theme: ''
    };

    // 从 localStorage 读取阅读设置（优先按用户隔离，fallback 全局）
    function loadReadingSettings() {
      let stored = null;
      if (currentUserId) {
        stored = localStorage.getItem(`readingSettings:${currentUserId}`);
      }
      // fallback 到旧的全局 key（迁移兼容）
      if (!stored) {
        stored = localStorage.getItem('readingSettings');
      }
      readingSettings = stored ? JSON.parse(stored) : { ...DEFAULT_READING_SETTINGS };
      // 确保有默认字段
      readingSettings.pageMode = readingSettings.pageMode || 'scroll';
      readingSettings.fontFamily = readingSettings.fontFamily || DEFAULT_READING_SETTINGS.fontFamily;
      // 迁移旧 theme key（兼容旧存储格式）
      if (!readingSettings.theme) {
        const legacyTheme = localStorage.getItem('theme');
        if (legacyTheme) readingSettings.theme = legacyTheme;
      }
    }

    let readingSettings = { ...DEFAULT_READING_SETTINGS };
    // 未登录时先从全局 key 加载（会在登录后被用户 key 覆盖）
    loadReadingSettings();

    function applyReadingSettings() {
      const reader = document.getElementById('reader');
      if (!reader) return;
      reader.style.fontFamily = readingSettings.fontFamily || '';
      reader.style.fontSize = readingSettings.fontSize || '';
      if (readingSettings.theme) {
        document.body.classList.toggle('dark', readingSettings.theme === 'dark');
      }

      if (readingSettings.pageMode === 'scroll') {
        reader.classList.remove('page-mode');
        // 恢复纵向滚动
        reader.style.overflowY = '';
        reader.style.overflowX = '';
        // 重置横向滚动位置
        reader.scrollLeft = 0;
      } else {
        // click 翻页：移动端保持 scroll（覆盖在 initMobile 里）
        reader.classList.add('page-mode');
      }
    }

    // 拦截函数：阻止用户在 page-mode 下手动滚动（wheel / touchmove）
    // 但不阻止：有文本选区时、目标在菜单/面板内时（保留选区 handle 拖动）
    const SCROLL_BLOCK_EXEMPT = '#highlightMenu,#inputDialog,#settingsDialog,#readingSettingsDialog,#notesPanel,.sidebar';
    function blockPageScroll(e) {
      if (window.getSelection().toString().trim().length > 0) return;
      if (e.target && e.target.closest && e.target.closest(SCROLL_BLOCK_EXEMPT)) return;
      e.preventDefault();
    }

    function setupPageMode() {
      const reader = document.getElementById('reader');
      // 先移除旧监听
      reader.removeEventListener('click', handleClickPage);
      reader.removeEventListener('wheel', blockPageScroll);
      reader.removeEventListener('touchmove', blockPageScroll);

      applyReadingSettings();

      if (readingSettings.pageMode === 'click') {
        reader.addEventListener('click', handleClickPage);
        // 禁止触控板/鼠标横向滑动
        reader.addEventListener('wheel', blockPageScroll, { passive: false });
        reader.addEventListener('touchmove', blockPageScroll, { passive: false });
      }
    }

    function getPageStep(reader) {
      const style = getComputedStyle(reader);
      if (isMobile()) {
        // 手机单列：column-width = 100vw-32px，gap = 32px
        // step = column-width + gap = (innerWidth-32) + 32 = innerWidth
        return window.innerWidth;
      }
      // 桌面双列：step = (列宽 + gap) * 2
      const gap = parseFloat(style.columnGap) || 80;
      const colWidth = (reader.clientWidth - gap) / 2;
      return (colWidth + gap) * 2;
    }

    function handleClickPage(e) {
      if (e.target.closest('#highlightMenu')) return;
      if (e.target.closest('#inputDialog')) return;
      if (e.target.closest('#settingsDialog')) return;
      if (e.target.closest('#readingSettingsDialog')) return;
      if (e.target.closest('#notesPanel')) return;
      if (e.target.closest('.sidebar')) return;
      // 有文本选区时不翻页
      if (window.getSelection().toString().trim().length > 0) return;
      // 最近 500ms 内发生过选区操作，不翻页
      if (Date.now() - lastSelectionAt < 500) return;

      const reader = document.getElementById('reader');
      const rect = reader.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const step = getPageStep(reader);
      const maxScroll = reader.scrollWidth - reader.clientWidth;
      const currentPage = Math.round(reader.scrollLeft / step);

      if (clickX > rect.width * 0.5) {
        const next = (currentPage + 1) * step;
        const atEnd = reader.scrollLeft >= maxScroll - 8;
        if (atEnd) {
          if (currentChapter.index < window.chapters.length - 1)
            loadChapter(currentChapter.index + 1, window.chapters[currentChapter.index + 1].title);
        } else {
          reader.scrollTo({ left: Math.min(next, maxScroll), behavior: 'smooth' });
        }
      } else {
        const atStart = reader.scrollLeft <= 8;
        if (atStart) {
          if (currentChapter.index > 0) {
            loadChapter(currentChapter.index - 1, window.chapters[currentChapter.index - 1].title);
            setTimeout(() => { reader.scrollLeft = reader.scrollWidth; }, 100);
          }
        } else {
          reader.scrollTo({ left: (currentPage - 1) * step, behavior: 'smooth' });
        }
      }
    }

    function openReadingSettings() {
      document.getElementById('pageMode').value = readingSettings.pageMode || 'scroll';
      document.getElementById('fontFamily').value = readingSettings.fontFamily || DEFAULT_READING_SETTINGS.fontFamily;
      document.getElementById('fontSize').value = readingSettings.fontSize || '';
      document.getElementById('themeSelect').value = readingSettings.theme || (document.body.classList.contains('dark') ? 'dark' : 'light');
      document.getElementById('readingSettingsDialog').style.display = 'flex';
    }

    function closeReadingSettings() {
      document.getElementById('readingSettingsDialog').style.display = 'none';
    }

    function persistReadingSettings() {
      const key = currentUserId ? `readingSettings:${currentUserId}` : 'readingSettings';
      localStorage.setItem(key, JSON.stringify(readingSettings));
    }

    function saveReadingSettings() {
      readingSettings = {
        pageMode: document.getElementById('pageMode').value,
        fontFamily: document.getElementById('fontFamily').value,
        fontSize: document.getElementById('fontSize').value,
        theme: document.getElementById('themeSelect').value
      };
      persistReadingSettings();
      applyReadingSettings();
      closeReadingSettings();
      if (currentChapter) setupPageMode();
    }

    function openSettings() {
      document.getElementById('cheapApiKey').value = userApiConfig.cheap?.apiKey || '';
      document.getElementById('cheapBaseUrl').value = userApiConfig.cheap?.baseUrl || '';
      document.getElementById('cheapModel').value = userApiConfig.cheap?.model || '';
      document.getElementById('mainApiKey').value = userApiConfig.main?.apiKey || '';
      document.getElementById('mainBaseUrl').value = userApiConfig.main?.baseUrl || '';
      document.getElementById('mainModel').value = userApiConfig.main?.model || '';
      document.getElementById('settingsDialog').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settingsDialog').style.display = 'none';
    }

    function saveSettings() {
      userApiConfig = {
        cheap: {
          apiKey: document.getElementById('cheapApiKey').value,
          baseUrl: document.getElementById('cheapBaseUrl').value,
          model: document.getElementById('cheapModel').value
        },
        main: {
          apiKey: document.getElementById('mainApiKey').value,
          baseUrl: document.getElementById('mainBaseUrl').value,
          model: document.getElementById('mainModel').value
        }
      };
      localStorage.setItem(`apiConfig:${currentUserId}`, JSON.stringify(userApiConfig));
      closeSettings();
      alert('设置已保存');
    }

    async function testApi(type) {
      const apiKey = document.getElementById(`${type}ApiKey`).value;
      const baseUrl = document.getElementById(`${type}BaseUrl`).value;
      const model = document.getElementById(`${type}Model`).value;

      if (!apiKey) {
        showTestResult(type, '请输入 API Key', false);
        return;
      }

      const testResult = document.getElementById(`${type}TestResult`);
      testResult.style.display = 'block';
      testResult.style.background = 'var(--accent-soft)';
      testResult.style.color = 'var(--ink)';
      testResult.textContent = '正在测试连接...';

      try {
        const res = await authFetch(`${API_BASE}/api/ai/test`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            apiKey,
            baseUrl: baseUrl || 'https://api.openai.com/v1',
            model: model || 'gpt-3.5-turbo',
            type
          })
        });

        const data = await res.json();

        if (res.ok) {
          showTestResult(type, '✓ 连接成功！API 可用', true);
        } else {
          showTestResult(type, `✗ 连接失败: ${data.error}`, false);
        }
      } catch (error) {
        showTestResult(type, '✗ 连接失败: 网络错误', false);
      }
    }

    function showTestResult(type, message, success) {
      const testResult = document.getElementById(`${type}TestResult`);
      testResult.style.display = 'block';
      testResult.style.background = success ? 'oklch(92% 0.08 140)' : 'oklch(92% 0.08 30)';
      testResult.style.color = success ? 'oklch(35% 0.12 140)' : 'oklch(45% 0.12 30)';
      testResult.textContent = message;
    }

    function showDialog(title, placeholder = '') {
      return new Promise(resolve => {
        dialogResolve = resolve;
        document.getElementById('dialogTitle').textContent = title;
        document.getElementById('dialogInput').value = '';
        document.getElementById('dialogInput').placeholder = placeholder;
        document.getElementById('inputDialog').style.display = 'flex';
        setTimeout(() => document.getElementById('dialogInput').focus(), 100);
      });
    }

    function closeDialog() {
      document.getElementById('inputDialog').style.display = 'none';
      if (dialogResolve) dialogResolve(null);
    }

    function submitDialog() {
      const value = document.getElementById('dialogInput').value.trim();
      document.getElementById('inputDialog').style.display = 'none';
      if (dialogResolve) dialogResolve(value);
    }

    async function uploadBook() {
      const file = document.getElementById('uploadBook').files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      let res;
      try {
        res = await authFetch(`${API_BASE}/api/books/upload`, { method: 'POST', body: formData });
      } catch {
        alert('上传失败: 无法连接服务器，请确认服务正在运行');
        document.getElementById('uploadBook').value = '';
        return;
      }
      document.getElementById('uploadBook').value = '';
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert('上传失败: ' + (data.error || res.status));
        return;
      }
      loadBooks();
    }

    async function loadProgress() {
      const res = await authFetch(`${API_BASE}/api/progress`);
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      progress = data.progress || {};
      bookmarks = data.bookmarks || {};
      // 迁移旧格式：aiComment string → messages array
      const rawNotes = data.allNotes || {};
      let needsMigration = false;
      for (const bookName of Object.keys(rawNotes)) {
        rawNotes[bookName] = rawNotes[bookName].map(note => {
          if (!note.messages) {
            needsMigration = true;
            if (note.aiComment) {
              const role = note.type === 'self' ? 'user' : 'ai';
              note.messages = [{ role, content: note.aiComment }];
              delete note.aiComment;
            } else {
              note.messages = [];
            }
          }
          if (!note.type) note.type = 'ai';
          return note;
        });
      }
      allNotes = rawNotes;
      if (needsMigration) saveProgress();
    }

    async function saveProgress() {
      await authFetch(`${API_BASE}/api/progress`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ progress, bookmarks, allNotes })
      });
    }

    function persistNotes() {
      if (currentBook) allNotes[currentBook.name] = notes;
      return saveProgress();
    }

    async function loadBooks() {
      const res = await authFetch(`${API_BASE}/api/books`);
      if (res.status === 401) { logout(); return; }
      const books = await res.json();
      if (!Array.isArray(books)) return;
      document.getElementById('bookList').innerHTML = books.map(book =>
        `<div class="book-item" onclick="loadChapters('${encodeURIComponent(book.filename)}', '${book.name}')" style="display:flex;justify-content:space-between;align-items:center;">
          <span>${book.name}</span>
          <button onclick="event.stopPropagation();deleteBook('${encodeURIComponent(book.filename)}')" style="background:none;border:none;color:var(--ink-lighter);cursor:pointer;padding:4px 8px;font-size:16px;" title="删除">×</button>
        </div>`
      ).join('');
    }

    async function deleteBook(filename) {
      if (!confirm('确认删除这本书？')) return;
      const deletingCurrent = currentBook && currentBook.filename === filename;
      await authFetch(`${API_BASE}/api/books/${filename}`, { method: 'DELETE' });

      if (deletingCurrent) {
        currentBook = null;
        currentChapter = null;
        document.getElementById('chapterList').innerHTML = '';

        // 取剩余书单，自动切换
        const res = await authFetch(`${API_BASE}/api/books`);
        const books = await res.json();
        if (books.length > 0) {
          const next = books[books.length - 1]; // 优先切到最后一本（即"上一本"）
          document.getElementById('bookList').innerHTML = books.map(book =>
            `<div class="book-item" onclick="loadChapters('${encodeURIComponent(book.filename)}', '${book.name}')" style="display:flex;justify-content:space-between;align-items:center;">
              <span>${book.name}</span>
              <button onclick="event.stopPropagation();deleteBook('${encodeURIComponent(book.filename)}')" style="background:none;border:none;color:var(--ink-lighter);cursor:pointer;padding:4px 8px;font-size:16px;" title="删除">×</button>
            </div>`
          ).join('');
          loadChapters(encodeURIComponent(next.filename), next.name);
        } else {
          document.getElementById('reader').innerHTML = '<div class="empty-state">静候书页翻开</div>';
          loadBooks();
        }
      } else {
        loadBooks();
      }
    }

    async function loadChapters(filename, bookName) {
      const reader = document.getElementById('reader');

      // 立刻清空旧书内容，显示 loading，防止旧书残影
      reader.innerHTML = '<div class="reader-loading"><div class="reader-loading-spinner"></div><span>正在打开书籍…</span></div>';
      document.getElementById('chapterList').innerHTML = '';

      currentBook = { filename, name: bookName };
      let chapters;
      try {
        const res = await authFetch(`${API_BASE}/api/books/${filename}/chapters`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        chapters = await res.json();
      } catch (err) {
        reader.innerHTML = `<div class="reader-error">
          <span>加载失败：${err.message}</span>
          <button class="save-btn" onclick="loadChapters('${filename}','${bookName.replace(/'/g,"\\'")}')">重试</button>
        </div>`;
        return;
      }

      document.getElementById('chapterList').innerHTML = chapters.map((ch, i) =>
        `<div class="chapter-item" onclick="loadChapter(${i}, '${ch.title}')">${ch.title}</div>`
      ).join('');
      window.chapters = chapters;

      notes = allNotes[bookName] || [];
      renderNotes();

      const bookBookmarks = bookmarks[bookName] || [];
      if (bookBookmarks.length > 0) {
        const latest = bookBookmarks[bookBookmarks.length - 1];
        loadChapter(latest.chapter, chapters[latest.chapter].title);
      } else {
        loadChapter(0, chapters[0].title);
      }
    }

    function loadChapter(index, title) {
      currentChapter = { index, title };
      const chapter = window.chapters[index];

      let htmlText = chapter.text;

      // 在当前章节的文本中还原高亮
      const chapterNotes = notes.filter(n => n.chapterTitle === title);
      chapterNotes.forEach(note => {
        const textToFind = note.highlightedText;
        const replaceWith = `<span class="highlight" data-note-id="${note.id}">${textToFind}</span>`;
        // 只替换第一次出现的匹配内容（防止有重复内容全部替换）
        htmlText = htmlText.replace(textToFind, replaceWith);
      });

      const paragraphs = htmlText.split('\n\n')
        .map((p, i) => `<p data-para="${i}">${p}</p>`)
        .join('');
      const reader = document.getElementById('reader');
      reader.innerHTML = `<h1>${title}</h1>${paragraphs}`;
      document.querySelectorAll('.chapter-item').forEach((el, i) => el.classList.toggle('active', i === index));
      enableTextSelection();
      setupPageMode();
      mobileOnChapterLoad(currentBook ? currentBook.name : '', title);

      const bookBookmarks = bookmarks[currentBook.name] || [];
      const chapterBookmarks = bookBookmarks.filter(b => b.chapter === index);
      chapterBookmarks.forEach(b => {
        const para = document.querySelector(`[data-para="${b.paragraph}"]`);
        if (para) para.classList.add('bookmark');
      });

      if (chapterBookmarks.length > 0) {
        const latest = chapterBookmarks[chapterBookmarks.length - 1];
        setTimeout(() => {
          const para = document.querySelector(`[data-para="${latest.paragraph}"]`);
          if (para) para.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      } else {
        // 没有书签：切到新章节从顶部开始
        reader.scrollTop = 0;
        reader.scrollLeft = 0;
      }

      // 注册 scroll 自动翻下一章（仅 scroll 模式）
      setupAutoNextChapter(reader, index);
    }

    // 自动翻下一章：scroll 模式下滚到底部时切换
    let _autoNextTimer = null;
    let _autoNextLock = false;
    function setupAutoNextChapter(reader, chapterIndex) {
      // 先移除旧的监听（每次切章都重建）
      if (reader._scrollHandler) {
        reader.removeEventListener('scroll', reader._scrollHandler);
        reader._scrollHandler = null;
      }
      _autoNextLock = false;

      reader._scrollHandler = function() {
        // 仅 scroll 模式生效
        if (readingSettings.pageMode !== 'scroll') return;
        if (_autoNextLock) return;

        clearTimeout(_autoNextTimer);
        _autoNextTimer = setTimeout(() => {
          const atBottom = reader.scrollHeight - reader.scrollTop - reader.clientHeight < 40;
          if (!atBottom) return;
          const chapters = window.chapters;
          if (!chapters || chapterIndex >= chapters.length - 1) return;
          _autoNextLock = true;
          loadChapter(chapterIndex + 1, chapters[chapterIndex + 1].title);
        }, 300);
      };

      reader.addEventListener('scroll', reader._scrollHandler, { passive: true });
    }



    function toggleBookmark(paraIndex) {
      if (!bookmarks[currentBook.name]) bookmarks[currentBook.name] = [];
      const bookBookmarks = bookmarks[currentBook.name];
      const existingIndex = bookBookmarks.findIndex(b =>
        b.chapter === currentChapter.index && b.paragraph === paraIndex
      );

      const para = document.querySelector(`[data-para="${paraIndex}"]`);

      if (existingIndex >= 0) {
        bookBookmarks.splice(existingIndex, 1);
        para.classList.remove('bookmark');
        console.log('书签已移除');
      } else {
        bookBookmarks.push({
          chapter: currentChapter.index,
          paragraph: paraIndex,
          time: new Date().toISOString()
        });
        para.classList.add('bookmark');
        console.log('书签已添加');
      }

      saveProgress();
    }

    let textSelectionInitialized = false;
    let lastSelectionAt = 0;  // 最近一次有效选区时间戳，防止选词后误触翻页

    function enableTextSelection() {
      if (textSelectionInitialized) return;
      textSelectionInitialized = true;

      function tryShowHighlightMenu(targetEl) {
        const selection = window.getSelection();
        const text = selection.toString().trim();
        if (text.length > 5) {
          // 确认选区锚点在 reader 内
          const anchor = selection.anchorNode;
          const readerEl = document.getElementById('reader');
          if (!readerEl || !readerEl.contains(anchor)) return;
          selectedText = text;
          selectedRange = selection.getRangeAt(0);
          lastSelectionAt = Date.now();
          const menu = document.getElementById('highlightMenu');
          if (isMobile()) {
            menu.classList.add('mobile-visible');
          } else {
            menu.style.display = 'block';
            const rect = selectedRange.getBoundingClientRect();
            menu.style.left = (rect.left + window.scrollX) + 'px';
            menu.style.top = (rect.bottom + window.scrollY + 8) + 'px';
          }
          menu._justOpened = true;
        }
      }

      // 桌面：mouseup 后直接读取
      document.addEventListener('mouseup', (e) => {
        setTimeout(() => tryShowHighlightMenu(e.target), 20);
      });

      // 移动端：touchend 后延迟让浏览器完成选区
      document.addEventListener('touchend', (e) => {
        setTimeout(() => tryShowHighlightMenu(e.target), 120);
      });

      // 移动端：selectionchange debounce，更稳定地捕获长按/拖选
      if (isMobile()) {
        let selTimer = null;
        document.addEventListener('selectionchange', () => {
          clearTimeout(selTimer);
          selTimer = setTimeout(() => tryShowHighlightMenu(null), 200);
        });
      }

      document.addEventListener('click', (e) => {
        const menu = document.getElementById('highlightMenu');
        if (menu._justOpened) { menu._justOpened = false; return; }
        // 点击菜单按钮或输入框时不关闭、不清除选区
        if (e.target.closest('#highlightMenu') || e.target.closest('#inputDialog')) return;
        menu.classList.remove('mobile-visible');
        menu.style.display = 'none';
        window.getSelection().removeAllRanges();
      });
    }


    async function handleHighlight(type) {
      const menu = document.getElementById('highlightMenu');
      menu.classList.remove('mobile-visible');
      menu.style.display = 'none';

      // 书签：找到选区所在段落，切换书签后返回
      if (type === 'bookmark') {
        const para = selectedRange.startContainer.nodeType === Node.TEXT_NODE
          ? selectedRange.startContainer.parentElement.closest('p')
          : selectedRange.startContainer.closest('p');
        if (para && para.dataset.para !== undefined) {
          toggleBookmark(parseInt(para.dataset.para));
        }
        window.getSelection().removeAllRanges();
        return;
      }

      const parentPara = selectedRange.startContainer.parentElement.closest('p');
      const paragraphText = parentPara ? parentPara.textContent : '';

      // 如果选区跨越多个段落，收缩到起始段落末尾，避免 deleteContents 破坏 DOM 结构
      const startPara = selectedRange.startContainer.nodeType === Node.TEXT_NODE
        ? selectedRange.startContainer.parentElement.closest('p')
        : selectedRange.startContainer.closest('p');
      const endPara = selectedRange.endContainer.nodeType === Node.TEXT_NODE
        ? selectedRange.endContainer.parentElement.closest('p')
        : selectedRange.endContainer.closest('p');

      if (startPara && endPara && startPara !== endPara) {
        // 跨段落：只取选区内的文本，不操作 DOM，仅记录笔记
        const noteId = String(Date.now());
        const note = {
          id: noteId,
          type,
          bookName: currentBook ? currentBook.name : '',
          chapterTitle: currentChapter.title,
          highlightedText: selectedText,
          contextText: paragraphText,
          messages: [],
          timestamp: new Date().toLocaleString('zh-CN')
        };

        if (type === 'self') {
          const comment = await showDialog('写下你的想法');
          if (comment) note.messages = [{ role: 'user', content: comment }];
        } else if (type === 'ai') {
          if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) { alert('请先在设置中配置 API Key'); return; }
          notes.unshift(note);
          renderNotes();
          persistNotes();
          window.getSelection().removeAllRanges();
          triggerAiComment(note);
          return;
        } else if (type === 'discuss') {
          if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) { alert('请先在设置中配置 API Key'); return; }
          const question = await showDialog('你想讨论什么？');
          if (question) {
            note.messages = [{ role: 'user', content: question }];
            notes.unshift(note);
            renderNotes();
            persistNotes();
            window.getSelection().removeAllRanges();
            triggerAiComment(note);
          }
          return;
        }

        notes.unshift(note);
        renderNotes();
        persistNotes();
        window.getSelection().removeAllRanges();
        return;
      }

      // 同段落内：插入高亮 span（不 deleteContents，避免原文丢失）
      const noteId = String(Date.now());
      const span = document.createElement('span');
      span.className = 'highlight';
      span.textContent = selectedText;
      span.dataset.noteId = noteId;
      try {
        selectedRange.surroundContents(span);
      } catch (e) {
        // surroundContents 失败（选区跨节点边界）：降级为只记录笔记，不插入高亮
        console.warn('highlight surroundContents failed, note-only fallback', e);
      }

      const note = {
        id: noteId,
        type,
        bookName: currentBook ? currentBook.name : '',
        chapterTitle: currentChapter.title,
        highlightedText: selectedText,
        contextText: paragraphText,
        messages: [],
        timestamp: new Date().toLocaleString('zh-CN')
      };

      if (type === 'self') {
        const comment = await showDialog('写下你的想法');
        if (comment) note.messages = [{ role: 'user', content: comment }];
      } else if (type === 'ai') {
        if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) {
          alert('请先在设置中配置 API Key');
          return;
        }
        notes.unshift(note);
        renderNotes();
        persistNotes();
        window.getSelection().removeAllRanges();
        triggerAiComment(note);
        return;
      } else if (type === 'discuss') {
        if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) {
          alert('请先在设置中配置 API Key');
          return;
        }
        const question = await showDialog('你想讨论什么？');
        if (question) {
          note.messages = [{ role: 'user', content: question }];
          notes.unshift(note);
          renderNotes();
          persistNotes();
          window.getSelection().removeAllRanges();
          triggerAiComment(note);
        }
        return;
      }

      notes.unshift(note);
      renderNotes();
      persistNotes();
      window.getSelection().removeAllRanges();
    }

    function renderNotes() {
      document.getElementById('notesList').innerHTML = notes.map((note, index) => {
        const msgs = note.messages || [];
        const isLoading = msgs.length > 0 && msgs[msgs.length - 1].content === '正在思考…';
        const canInteract = msgs.length > 0 && !isLoading;
        const btnLabel = note.type === 'self' ? '💬 评论' : '💬 继续讨论';

        // 书名 + 章节元信息
        const bookName = note.bookName || (currentBook ? currentBook.name : '');
        const chapterTitle = note.chapterTitle || '';
        const metaHtml = (bookName || chapterTitle) ? `<div style="font-size:11px;color:var(--ink-lighter);margin-bottom:8px;letter-spacing:0.03em;">${bookName ? `《${bookName}》` : ''}${bookName && chapterTitle ? ' / ' : ''}${chapterTitle}</div>` : '';

        const bubblesHtml = msgs.map(m => {
          const isUser = m.role === 'user';
          const wrapClass = isUser ? 'msg-user-wrap' : 'msg-ai-wrap';
          const bubClass = isUser ? 'msg-bubble msg-user' : 'msg-bubble msg-ai';
          const label = isUser ? '我' : 'AI';
          return `<div class="${wrapClass}">
            <div class="msg-label">${label}</div>
            <div class="${bubClass}">${m.content}</div>
          </div>`;
        }).join('');

        return `
        <div class="note-card">
          <button class="delete-btn" onclick="deleteNote(${index})" title="删除">×</button>
          ${metaHtml}
          <div class="note-highlight" onclick="locateHighlight('${note.id}')" style="cursor:pointer;" title="定位到原文">"${note.highlightedText.slice(0, 80)}${note.highlightedText.length > 80 ? '…' : ''}"</div>
          ${bubblesHtml ? `<div class="note-messages">${bubblesHtml}</div>` : ''}
          ${canInteract ? `<button class="menu-btn" onclick="continueDiscussion(${index})" style="margin-top:8px;padding:6px 12px;font-size:12px;">${btnLabel}</button>` : ''}
          <div class="note-time">${note.timestamp}</div>
        </div>`;
      }).join('');
    }

    function locateHighlight(noteId) {
      const note = notes.find(n => n.id === noteId);
      if (!note) return;

      if (currentChapter && currentChapter.title === note.chapterTitle) {
        scrollToHighlight(noteId);
      } else {
        const chapterIdx = window.chapters.findIndex(ch => ch.title === note.chapterTitle);
        if (chapterIdx >= 0) {
          loadChapter(chapterIdx, note.chapterTitle);
          // 等待 DOM 渲染后再滚动
          setTimeout(() => scrollToHighlight(noteId), 150);
        }
      }
    }

    function scrollToHighlight(noteId) {
      const highlight = document.querySelector(`[data-note-id="${noteId}"]`);
      if (highlight) {
        highlight.scrollIntoView({ behavior: 'smooth', block: 'center' });
        highlight.style.transition = 'background 0.3s';
        const originalBg = highlight.style.background;
        highlight.style.background = 'var(--accent)';
        setTimeout(() => highlight.style.background = originalBg, 1200);
      }
    }

    function deleteNote(index) {
      if (confirm('确认删除这条笔记？')) {
        const note = notes[index];
        const highlights = document.querySelectorAll('.highlight');
        highlights.forEach(span => {
          if (span.dataset.noteId === note.id) {
            const text = document.createTextNode(span.textContent);
            span.parentNode.replaceChild(text, span);
          }
        });
        notes.splice(index, 1);
        renderNotes();
        persistNotes();
      }
    }

    async function triggerAiComment(note) {
      if (!note.messages) note.messages = [];
      note.messages.push({ role: 'ai', content: '正在思考…' });
      renderNotes();
      const text = window.chapters[currentChapter.index].text;
      const pos = text.indexOf(note.highlightedText);
      const surrounding = text.slice(Math.max(0, pos - 300), Math.min(text.length, pos + 300));
      try {
        const res = await authFetch(`${API_BASE}/api/ai/comment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            bookTitle: currentBook.name,
            chapterTitle: note.chapterTitle,
            highlightedText: note.highlightedText,
            surroundingText: surrounding,
            previousInsights: [],
            conversationHistory: [],
            userApiConfig
          })
        });
        const data = await res.json();
        note.messages[note.messages.length - 1].content = data.comment || data.error || 'AI 调用失败';
      } catch {
        note.messages[note.messages.length - 1].content = '网络错误，请重试';
      }
      renderNotes();
      persistNotes();
    }

    async function continueDiscussion(index) {
      if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) {
        alert('请先在设置中配置 API Key');
        return;
      }

      const note = notes[index];
      const isSelf = note.type === 'self';
      const question = await showDialog(isSelf ? '写下你对这段评论的想法' : '继续讨论什么？', '输入你的问题或想法');

      if (question) {
        if (!note.messages) note.messages = [];
        note.messages.push({ role: 'user', content: question });
        note.messages.push({ role: 'ai', content: '正在思考…' });
        renderNotes();

        const text = window.chapters[currentChapter.index].text;
        const pos = text.indexOf(note.highlightedText);
        const surrounding = text.slice(Math.max(0, pos - 300), Math.min(text.length, pos + 300));

        // 构建对话历史（排除最后一条"正在思考"）
        const history = note.messages.slice(0, -1).map(m => ({
          role: m.role === 'user' ? 'user' : 'assistant',
          content: m.content
        }));

        try {
          const res = await authFetch(`${API_BASE}/api/ai/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              bookTitle: currentBook.name,
              chapterTitle: note.chapterTitle,
              highlightedText: note.highlightedText,
              surroundingText: surrounding,
              previousInsights: [],
              conversationHistory: history,
              userApiConfig
            })
          });
          const data = await res.json();
          note.messages[note.messages.length - 1].content = data.comment || data.error || 'AI 调用失败';
        } catch {
          note.messages[note.messages.length - 1].content = '网络错误，请重试';
        }
        renderNotes();
        persistNotes();
      }
    }

    async function saveNotes() {
      await persistNotes();
      alert('笔记已保存');
    }

    function openExportDialog() {
      if (!currentBook || notes.length === 0) {
        alert('暂无笔记可导出');
        return;
      }
      document.getElementById('exportDialog').style.display = 'flex';
    }

    function closeExportDialog() {
      document.getElementById('exportDialog').style.display = 'none';
    }

    function exportNotes() {
      const format = document.getElementById('exportFormat').value;

      let content = '';
      const bookTitle = currentBook.name;
      const timestamp = new Date().toLocaleString('zh-CN');

      function msgsToText(messages) {
        if (!messages || messages.length === 0) return '';
        return messages.map(m => (m.role === 'user' ? '我：' : 'AI：') + m.content).join('\n\n');
      }

      if (format === 'md') {
        content = `# ${bookTitle}\n\n> 导出时间：${timestamp}\n\n`;
        notes.forEach(note => {
          content += `## ${note.chapterTitle}\n\n`;
          content += `**划线原文：**\n> ${note.highlightedText}\n\n`;
          const msgText = msgsToText(note.messages);
          if (msgText) {
            content += `**评论/笔记：**\n${msgText.split('\n').map(line => '    ' + line).join('\n')}\n\n`;
          }
          content += `*${note.timestamp}*\n\n---\n\n`;
        });
      } else if (format === 'html') {
        content = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>${bookTitle} - 阅读笔记</title>
  <style>
    body { font-family: 'Noto Serif SC', serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.8; color: #2d3436; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    .note { margin: 30px 0; padding: 20px; background: #f9f9f9; border-left: 4px solid #0984e3; border-radius: 4px; }
    .highlight { color: #d63031; font-weight: 600; margin-bottom: 15px; border-bottom: 1px dashed #d63031; display: inline-block; }
    .comment { margin-left: 30px; color: #2d3436; white-space: pre-wrap; border-left: 3px solid #dfe6e9; padding-left: 15px; margin-top: 15px; }
    .time { color: #b2bec3; font-size: 0.85em; margin-top: 15px; }
  </style>
</head>
<body>
  <h1>${bookTitle}</h1>
  <p style="color:#b2bec3;">导出时间：${timestamp}</p>
`;
        notes.forEach(note => {
          const msgText = msgsToText(note.messages);
          content += `  <div class="note">
    <h2>${note.chapterTitle}</h2>
    <div class="highlight">"${note.highlightedText}"</div>
    ${msgText ? `<div class="comment">${msgText}</div>` : ''}
    <div class="time">${note.timestamp}</div>
  </div>\n`;
        });
        content += `</body>\n</html>`;
      } else if (format === 'txt') {
        content = `${bookTitle}\n导出时间：${timestamp}\n\n${'='.repeat(50)}\n\n`;
        notes.forEach(note => {
          content += `${note.chapterTitle}\n\n`;
          content += `[划线原文]：${note.highlightedText}\n\n`;
          const msgText = msgsToText(note.messages);
          if (msgText) {
            content += `[评论/笔记]：\n${msgText.split('\n').map(line => '    ' + line).join('\n')}\n\n`;
          }
          content += `时间：${note.timestamp}\n\n${'-'.repeat(50)}\n\n`;
        });
      }

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${bookTitle}-笔记.${format}`;
      a.click();
      URL.revokeObjectURL(url);
      closeExportDialog();
    }

    function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('currentUserId');
      authToken = null;
      currentUserId = null;
      userApiConfig = {};
      document.getElementById('authOverlay').style.display = 'flex';
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const theme = document.body.classList.contains('dark') ? 'dark' : 'light';
      // 把主题存入 readingSettings 并持久化
      readingSettings.theme = theme;
      persistReadingSettings();
    }

    // 移动端初始化
    (function initMobile() {
      if (!isMobile()) return;
      document.getElementById('sidebarCloseBtn').style.display = 'none';
    })();

    // 登录成功后加载用户的阅读设置并应用
    function onLoginSuccess() {
      loadApiConfig();
      loadReadingSettings();
      applyReadingSettings();
      loadProgress().then(loadBooks);
    }

    if (authToken) {
      if (!currentUserId) {
        fetch(`${API_BASE}/api/user/profile`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        }).then(r => r.ok ? r.json() : null).then(data => {
          if (data?.userId) {
            currentUserId = String(data.userId);
            localStorage.setItem('currentUserId', currentUserId);
            onLoginSuccess();
          } else {
            logout();
          }
        }).catch(() => logout());
      } else {
        onLoginSuccess();
      }
    } else {
      // 未登录：应用默认（或全局）设置
      applyReadingSettings();
      document.getElementById('authOverlay').style.display = 'flex';
    }
  </script>
</body>
</html>
