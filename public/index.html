<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper: oklch(97% 0.01 60);
      --ink: oklch(25% 0.01 60);
      --ink-fade: oklch(50% 0.01 60);
      --ink-lighter: oklch(70% 0.01 60);
      --accent: oklch(45% 0.08 30);
      --accent-soft: oklch(92% 0.02 30);
      --divider: oklch(88% 0.005 60);
      --highlight-bg: oklch(88% 0.04 50);
      --shadow: oklch(0% 0 0 / 0.05);
    }

    body.dark {
      --paper: oklch(18% 0.01 60);
      --ink: oklch(88% 0.01 60);
      --ink-fade: oklch(65% 0.01 60);
      --ink-lighter: oklch(50% 0.01 60);
      --accent: oklch(68% 0.08 30);
      --accent-soft: oklch(25% 0.02 30);
      --divider: oklch(28% 0.005 60);
      --highlight-bg: oklch(30% 0.04 50);
      --shadow: oklch(0% 0 0 / 0.2);
    }

    body {
      font-family: 'Noto Serif SC', 'Merriweather', serif;
      background: var(--paper);
      color: var(--ink);
      transition: background 0.4s, color 0.4s;
    }

    .container { display: flex; height: 100vh; }

    .sidebar {
      width: 240px;
      background: var(--paper);
      padding: 32px 20px;
      overflow-y: auto;
      border-right: 1px solid var(--divider);
    }

    .main { flex: 1; display: flex; flex-direction: column; }

    .reader {
      flex: 1;
      padding: 48px clamp(60px, 10vw, 140px) 120px;
      overflow-y: auto;
      max-width: 920px;
      margin: 0 auto;
      line-height: 2.1;
      font-size: clamp(16px, 1.1vw, 18px);
      letter-spacing: 0.02em;
    }

    .reader.page-mode {
      height: calc(100vh - 80px);
      overflow-y: hidden !important;
      overflow-x: scroll !important;
      column-count: 2;
      column-gap: 80px;
      column-fill: auto;
      padding: 24px 0;
      width: calc(100% - 160px);
      margin: 0 auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .reader.page-mode::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    @media (max-width: 768px) {
      .reader.page-mode {
        column-count: 1;
        column-gap: 40px;
        margin: 0 auto;
        width: calc(100% - 40px);
        padding: 16px 0;
        height: calc(100vh - 90px);
      }
    }

    .reader.page-mode h1 {
      break-inside: avoid;
      break-after: avoid;
    }

    .notes-panel {
      width: 340px;
      background: var(--paper);
      padding: 32px 20px;
      overflow-y: auto;
      border-left: 1px solid var(--divider);
    }

    .theme-toggle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 24px;
      transition: all 0.3s;
    }
    .theme-toggle:hover { transform: rotate(180deg); }

    h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-lighter);
      margin-bottom: 16px;
    }

    h3 {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-lighter);
      margin: 32px 0 12px;
    }

    .book-item {
      padding: 12px 8px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: color 0.2s;
      font-size: 15px;
      color: var(--ink-fade);
      border-left: 2px solid transparent;
      padding-left: 10px;
    }
    .book-item:hover {
      color: var(--ink);
      border-left-color: var(--accent);
    }

    .chapter-item {
      padding: 8px;
      margin-bottom: 2px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink-fade);
      transition: all 0.2s;
      border-radius: 4px;
    }
    .chapter-item:hover { color: var(--ink); }
    .chapter-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }

    .reader h1 {
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 600;
      margin-bottom: 48px;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .reader p {
      margin-bottom: 1.4em;
      color: var(--ink);
      text-indent: 2em;
      position: relative;
      cursor: pointer;
    }

    .reader p:hover::before {
      content: '🔖';
      position: absolute;
      left: -30px;
      opacity: 0.5;
    }

    .bookmark {
      background: linear-gradient(to right, var(--accent-soft) 0%, transparent 100%);
      border-left: 3px solid var(--accent);
      padding-left: 8px;
    }

    .highlight {
      background: linear-gradient(to bottom, transparent 70%, var(--highlight-bg) 70%);
      cursor: pointer;
      padding: 2px 0;
      border-bottom: 1px solid var(--accent);
      transition: all 0.2s;
    }
    .highlight:hover { background: var(--highlight-bg); }

    .highlight-menu {
      position: fixed;
      background: var(--paper);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 8px 32px var(--shadow);
      z-index: 1000;
      border: 1px solid var(--divider);
    }
    .menu-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background 0.2s;
      font-family: inherit;
    }
    .menu-btn:hover { background: var(--accent-soft); }

    .note-card {
      background: var(--paper);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--divider);
      position: relative;
      transition: all 0.2s;
    }
    .note-card:hover {
      box-shadow: 0 4px 16px var(--shadow);
      border-color: var(--accent);
    }
    .note-card:hover .delete-btn { opacity: 1; }

    .note-highlight {
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .note-comment {
      color: var(--ink-fade);
      font-size: 13px;
      line-height: 1.8;
      margin-top: 8px;
      white-space: pre-wrap;
      text-indent: 2em;
    }
    }

    .note-time {
      color: var(--ink-lighter);
      font-size: 11px;
      margin-top: 12px;
      letter-spacing: 0.03em;
    }

    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--ink-lighter);
      color: var(--paper);
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      opacity: 0;
      transition: all 0.2s;
      font-family: inherit;
    }
    .delete-btn:hover {
      background: var(--accent);
      transform: scale(1.1);
    }

    button.save-btn {
      background: var(--accent);
      color: var(--paper);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 0.05em;
    }
    button.save-btn:hover {
      background: var(--ink);
      transform: translateY(-1px);
    }

    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .empty-state {
      color: var(--ink-lighter);
      text-align: center;
      padding: 60px 20px;
      font-size: 14px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="authOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--paper);z-index:9999;align-items:center;justify-content:center;">
    <div style="width:360px;padding:32px;border:1px solid var(--divider);border-radius:8px;">
      <h3 style="margin-bottom:24px;color:var(--ink);text-align:center;" id="authTitle">登录</h3>
      <div style="margin-bottom:12px;">
        <input id="authEmail" type="email" placeholder="邮箱" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div style="margin-bottom:16px;">
        <input id="authPassword" type="password" placeholder="密码" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div id="authError" style="display:none;margin-bottom:12px;padding:8px;border-radius:4px;background:oklch(92% 0.08 30);color:oklch(45% 0.12 30);font-size:13px;"></div>
      <div style="display:flex;gap:8px;">
        <button class="save-btn" onclick="submitAuth()" style="flex:1;" id="authSubmitBtn">登录</button>
        <button class="menu-btn" onclick="toggleAuthMode()" style="flex:1;" id="authToggleBtn">注册</button>
      </div>
    </div>
  </div>
  <div class="container">
    <div class="sidebar">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">◐</button>
      <button class="theme-toggle" onclick="openSettings()" title="API 设置" style="margin-left:8px">⚙️</button>
      <button class="theme-toggle" onclick="openReadingSettings()" title="阅读设置" style="margin-left:8px">📖</button>
      <button class="theme-toggle" onclick="logout()" title="退出登录" style="margin-left:8px">⏻</button>
      <h2>书库</h2>
      <input type="file" id="uploadBook" accept=".epub" style="display:none" onchange="uploadBook()">
      <button class="save-btn" onclick="document.getElementById('uploadBook').click()" style="margin-bottom:12px;width:100%">+ 添加书籍</button>
      <div id="bookList"></div>
      <h3>章节</h3>
      <div id="chapterList"></div>
    </div>

    <div class="main">
      <div class="reader" id="reader">
        <div class="empty-state">静候书页翻开</div>
      </div>
    </div>

    <div class="notes-panel">
      <div class="notes-header">
        <h2>笔记</h2>
        <div style="display:flex;gap:8px;">
          <button class="save-btn" onclick="openExportDialog()">导出</button>
          <button class="save-btn" onclick="saveNotes()">保存</button>
        </div>
      </div>
      <div id="notesList"></div>
    </div>
  </div>

  <div id="settingsDialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:var(--paper);padding:24px;border-radius:8px;width:500px;max-width:90%;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-bottom:16px;color:var(--ink);">API 设置</h3>

      <h4 style="margin:16px 0 12px 0;color:var(--ink);font-size:14px;font-weight:600;">快速阅读模型 (Cheap)</h4>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;color:var(--ink-fade);font-size:13px;">API Key</label>
        <input id="cheapApiKey" type="password" placeholder="sk-..." style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;color:var(--ink-fade);font-size:13px;">Base URL</label>
        <input id="cheapBaseUrl" type="text" placeholder="https://api.openai.com/v1" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;color:var(--ink-fade);font-size:13px;">Model</label>
        <input id="cheapModel" type="text" placeholder="gpt-3.5-turbo" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div id="cheapTestResult" style="margin-bottom:12px;padding:10px;border-radius:4px;display:none;font-size:13px;"></div>
      <button class="menu-btn" onclick="testApi('cheap')" style="margin-bottom:16px;">测试连接</button>

      <h4 style="margin:24px 0 12px 0;color:var(--ink);font-size:14px;font-weight:600;">深度评论模型 (Main)</h4>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;color:var(--ink-fade);font-size:13px;">API Key</label>
        <input id="mainApiKey" type="password" placeholder="sk-..." style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;color:var(--ink-fade);font-size:13px;">Base URL</label>
        <input id="mainBaseUrl" type="text" placeholder="https://api.openai.com/v1" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;color:var(--ink-fade);font-size:13px;">Model</label>
        <input id="mainModel" type="text" placeholder="gpt-4" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
      </div>
      <div id="mainTestResult" style="margin-bottom:12px;padding:10px;border-radius:4px;display:none;font-size:13px;"></div>
      <button class="menu-btn" onclick="testApi('main')" style="margin-bottom:16px;">测试连接</button>

      <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:nowrap;">
        <button class="menu-btn" onclick="closeSettings()" style="white-space:nowrap;">取消</button>
        <button class="save-btn" onclick="saveSettings()" style="white-space:nowrap;">保存</button>
      </div>
    </div>
  </div>

  <div id="highlightMenu" class="highlight-menu" style="display: none;">
    <button class="menu-btn" onclick="handleHighlight('self')">自己写</button>
    <button class="menu-btn" onclick="handleHighlight('ai')">AI 评论</button>
    <button class="menu-btn" onclick="handleHighlight('discuss')">与 AI 讨论</button>
    <button class="menu-btn" onclick="handleHighlight('mark')">仅标记</button>
    <button class="menu-btn" onclick="handleHighlight('bookmark')">添加书签</button>
  </div>

  <div id="inputDialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:var(--paper);padding:20px;border-radius:8px;width:400px;max-width:90%;box-sizing:border-box;">
      <h3 style="margin:0 0 12px 0;color:var(--ink);font-size:18px;font-weight:600;" id="dialogTitle">输入内容</h3>
      <textarea id="dialogInput" style="width:100%;min-height:100px;padding:12px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);resize:vertical;box-sizing:border-box;font-size:14px;line-height:1.5;" autofocus></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;flex-wrap:nowrap;">
        <button class="menu-btn" onclick="closeDialog()" style="white-space:nowrap;">取消</button>
        <button class="save-btn" onclick="submitDialog()" style="white-space:nowrap;">确定</button>
      </div>
    </div>
  </div>

  <div id="exportDialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:var(--paper);padding:24px;border-radius:8px;width:400px;max-width:90%;box-sizing:border-box;">
      <h3 style="margin:0 0 16px 0;color:var(--ink);font-size:18px;font-weight:600;">导出笔记</h3>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:8px;color:var(--ink-fade);font-size:13px;">格式</label>
        <select id="exportFormat" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
          <option value="md">Markdown (.md)</option>
          <option value="html">HTML (.html)</option>
          <option value="txt">纯文本 (.txt)</option>
        </select>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:flex;align-items:center;color:var(--ink-fade);font-size:13px;cursor:pointer;">
          <input type="checkbox" id="includeContext" checked style="margin-right:8px;">
          包含上下文
        </label>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="menu-btn" onclick="closeExportDialog()" style="white-space:nowrap;">取消</button>
        <button class="save-btn" onclick="exportNotes()" style="white-space:nowrap;">导出</button>
      </div>
    </div>
  </div>

  <div id="readingSettingsDialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:var(--paper);padding:24px;border-radius:8px;width:400px;max-width:90%;box-sizing:border-box;">
      <h3 style="margin:0 0 16px 0;color:var(--ink);font-size:18px;font-weight:600;">阅读设置</h3>
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:8px;color:var(--ink-fade);font-size:13px;">翻页方式</label>
        <select id="pageMode" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
          <option value="scroll">向下滚动</option>
          <option value="click">点击翻页</option>
        </select>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:8px;color:var(--ink-fade);font-size:13px;">字体</label>
        <select id="fontFamily" style="width:100%;padding:10px;border:1px solid var(--divider);border-radius:4px;font-family:inherit;color:var(--ink);background:var(--paper);box-sizing:border-box;">
          <option value="'Noto Serif SC', 'Merriweather', serif">思源宋体（默认）</option>
          <option value="'LXGW WenKai', 'Noto Serif SC', serif">霞鹜文楷</option>
          <option value="'Songti SC', 'SimSun', serif">宋体</option>
          <option value="'Kaiti SC', 'KaiTi', serif">楷体</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="menu-btn" onclick="closeReadingSettings()" style="white-space:nowrap;">取消</button>
        <button class="save-btn" onclick="saveReadingSettings()" style="white-space:nowrap;">保存</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    let authToken = localStorage.getItem('authToken');
    let authMode = 'login';

    function authFetch(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: { ...options.headers, 'Authorization': `Bearer ${authToken}` }
      });
    }

    async function submitAuth() {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const errEl = document.getElementById('authError');
      errEl.style.display = 'none';
      try {
        const res = await fetch(`${API_BASE}/api/auth/${authMode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
        authToken = data.token;
        localStorage.setItem('authToken', authToken);
        document.getElementById('authOverlay').style.display = 'none';
        loadProgress().then(loadBooks);
      } catch {
        errEl.textContent = '网络错误'; errEl.style.display = 'block';
      }
    }

    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      document.getElementById('authTitle').textContent = authMode === 'login' ? '登录' : '注册';
      document.getElementById('authSubmitBtn').textContent = authMode === 'login' ? '登录' : '注册';
      document.getElementById('authToggleBtn').textContent = authMode === 'login' ? '注册' : '返回登录';
    }

    document.getElementById('authPassword').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
    let currentBook = null;
    let currentChapter = null;
    let notes = [];
    let selectedText = '';
    let selectedRange = null;
    let progress = {};
    let bookmarks = {};
    let allNotes = {};
    let dialogResolve = null;
    let stored = JSON.parse(localStorage.getItem('apiConfig') || '{}');
    if (stored.apiKey && !stored.cheap && !stored.main) {
      stored = {
        cheap: { apiKey: stored.apiKey, baseUrl: stored.baseUrl, model: stored.model },
        main: { apiKey: stored.apiKey, baseUrl: stored.baseUrl, model: stored.model }
      };
      localStorage.setItem('apiConfig', JSON.stringify(stored));
    }
    let userApiConfig = stored;
    let readingSettings = JSON.parse(localStorage.getItem('readingSettings') || '{"pageMode":"scroll","fontFamily":"\'Noto Serif SC\', \'Merriweather\', serif"}');

    function applyReadingSettings() {
      const reader = document.getElementById('reader');
      if (!reader) return;
      reader.style.fontFamily = readingSettings.fontFamily;

      if (readingSettings.pageMode === 'scroll') {
        reader.classList.remove('page-mode');
      } else {
        reader.classList.add('page-mode');
      }
    }

    function setupPageMode() {
      const reader = document.getElementById('reader');
      applyReadingSettings();

      reader.removeEventListener('click', handleClickPage);

      if (readingSettings.pageMode === 'click') {
        reader.addEventListener('click', handleClickPage);
      }
    }

    function getPageStep(reader) {
      // 读取浏览器实际渲染的列宽，步进 = (列宽 + gap) * 2
      const style = getComputedStyle(reader);
      const gap = parseFloat(style.columnGap) || 80;
      const colWidth = (reader.clientWidth - gap) / 2;
      return (colWidth + gap) * 2;
    }

    function handleClickPage(e) {
      if (e.target.closest('#highlightMenu')) return;
      if (e.target.closest('#inputDialog')) return;
      if (window.getSelection().toString().length > 0) return;

      const reader = document.getElementById('reader');
      const rect = reader.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const step = getPageStep(reader);
      const maxScroll = reader.scrollWidth - reader.clientWidth;
      const currentPage = Math.round(reader.scrollLeft / step);

      if (clickX > rect.width * 0.5) {
        const next = (currentPage + 1) * step;
        if (next > maxScroll + 10) {
          if (currentChapter.index < window.chapters.length - 1)
            loadChapter(currentChapter.index + 1, window.chapters[currentChapter.index + 1].title);
        } else {
          reader.scrollTo({ left: Math.min(next, maxScroll), behavior: 'smooth' });
        }
      } else {
        if (currentPage <= 0) {
          if (currentChapter.index > 0) {
            loadChapter(currentChapter.index - 1, window.chapters[currentChapter.index - 1].title);
            setTimeout(() => { reader.scrollLeft = reader.scrollWidth; }, 100);
          }
        } else {
          reader.scrollTo({ left: (currentPage - 1) * step, behavior: 'smooth' });
        }
      }
    }

    async function testApi(type) {
      const apiKey = document.getElementById(`${type}ApiKey`).value;
      const baseUrl = document.getElementById(`${type}BaseUrl`).value;
      const model = document.getElementById(`${type}Model`).value;

      if (!apiKey) {
        showTestResult(type, '请输入 API Key', false);
        return;
      }

      const testResult = document.getElementById(`${type}TestResult`);
      testResult.style.display = 'block';
      testResult.style.background = 'var(--accent-soft)';
      testResult.style.color = 'var(--ink)';
      testResult.textContent = '正在测试连接...';

      try {
        const res = await fetch(`${API_BASE}/api/ai/test`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            apiKey,
            baseUrl: baseUrl || 'https://api.openai.com/v1',
            model: model || 'gpt-3.5-turbo',
            type
          })
        });

        const data = await res.json();

        if (res.ok) {
          showTestResult(type, '✓ 连接成功！API 可用', true);
        } else {
          showTestResult(type, `✗ 连接失败: ${data.error}`, false);

    async function loadBooks() {

    async function deleteBook(filename) {
      if (!confirm('确认删除这本书？')) return;
      const deletingCurrent = currentBook && currentBook.filename === filename;
      await authFetch(`${API_BASE}/api/books/${filename}`, { method: 'DELETE' });

      if (deletingCurrent) {
        currentBook = null;
        currentChapter = null;
        document.getElementById('chapterList').innerHTML = '';

        // 取剩余书单，自动切换
        const res = await authFetch(`${API_BASE}/api/books`);
        const books = await res.json();
        if (books.length > 0) {
          const next = books[books.length - 1]; // 优先切到最后一本（即"上一本"）
          document.getElementById('bookList').innerHTML = books.map(book =>
            `<div class="book-item" onclick="loadChapters('${encodeURIComponent(book.filename)}', '${book.name}')" style="display:flex;justify-content:space-between;align-items:center;">
              <span>${book.name}</span>
              <button onclick="event.stopPropagation();deleteBook('${encodeURIComponent(book.filename)}')" style="background:none;border:none;color:var(--ink-lighter);cursor:pointer;padding:4px 8px;font-size:16px;" title="删除">×</button>
            </div>`
          ).join('');
          loadChapters(encodeURIComponent(next.filename), next.name);
        } else {
          document.getElementById('reader').innerHTML = '<div class="empty-state">静候书页翻开</div>';
          loadBooks();
        }
      } else {
        loadBooks();
      }
    }

    async function loadChapters(filename, bookName) {
      currentBook = { filename, name: bookName };
      const res = await authFetch(`${API_BASE}/api/books/${filename}/chapters`);
      const chapters = await res.json();
      document.getElementById('chapterList').innerHTML = chapters.map((ch, i) =>
        `<div class="chapter-item" onclick="loadChapter(${i}, '${ch.title}')">${ch.title}</div>`
      ).join('');
      window.chapters = chapters;

      notes = allNotes[bookName] || [];
      renderNotes();

      const bookBookmarks = bookmarks[bookName] || [];
      if (bookBookmarks.length > 0) {
        const latest = bookBookmarks[bookBookmarks.length - 1];
        loadChapter(latest.chapter, chapters[latest.chapter].title);
      } else {
        loadChapter(0, chapters[0].title);
      }
    }

    function loadChapter(index, title) {
      currentChapter = { index, title };
      const chapter = window.chapters[index];

      let htmlText = chapter.text;

      // 在当前章节的文本中还原高亮
      const chapterNotes = notes.filter(n => n.chapterTitle === title);
      chapterNotes.forEach(note => {
        const textToFind = note.highlightedText;
        const replaceWith = `<span class="highlight" data-note-id="${note.id}">${textToFind}</span>`;
        // 只替换第一次出现的匹配内容（防止有重复内容全部替换）
        htmlText = htmlText.replace(textToFind, replaceWith);
      });

      const paragraphs = htmlText.split('\n\n')
        .map((p, i) => `<p data-para="${i}">${p}</p>`)
        .join('');
      document.getElementById('reader').innerHTML = `<h1>${title}</h1>${paragraphs}`;
      document.querySelectorAll('.chapter-item').forEach((el, i) => el.classList.toggle('active', i === index));
      enableTextSelection();
      setupPageMode();

      const bookBookmarks = bookmarks[currentBook.name] || [];
      const chapterBookmarks = bookBookmarks.filter(b => b.chapter === index);
      chapterBookmarks.forEach(b => {
        const para = document.querySelector(`[data-para="${b.paragraph}"]`);
        if (para) para.classList.add('bookmark');
      });

      if (chapterBookmarks.length > 0) {
        const latest = chapterBookmarks[chapterBookmarks.length - 1];
        setTimeout(() => {
          const para = document.querySelector(`[data-para="${latest.paragraph}"]`);
          if (para) para.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }



    function toggleBookmark(paraIndex) {
      if (!bookmarks[currentBook.name]) bookmarks[currentBook.name] = [];
      const bookBookmarks = bookmarks[currentBook.name];
      const existingIndex = bookBookmarks.findIndex(b =>
        b.chapter === currentChapter.index && b.paragraph === paraIndex
      );

      const para = document.querySelector(`[data-para="${paraIndex}"]`);

      if (existingIndex >= 0) {
        bookBookmarks.splice(existingIndex, 1);
        para.classList.remove('bookmark');
        console.log('书签已移除');
      } else {
        bookBookmarks.push({
          chapter: currentChapter.index,
          paragraph: paraIndex,
          time: new Date().toISOString()
        });
        para.classList.add('bookmark');
        console.log('书签已添加');
      }

      saveProgress();
    }

    let textSelectionInitialized = false;
    function enableTextSelection() {
      if (textSelectionInitialized) return;
      textSelectionInitialized = true;

      document.addEventListener('mouseup', (e) => {
        const selection = window.getSelection();
        selectedText = selection.toString().trim();
        if (selectedText.length > 5 && e.target.closest('#reader')) {
          selectedRange = selection.getRangeAt(0);
          const menu = document.getElementById('highlightMenu');
          menu.style.display = 'block';
          menu.style.left = e.pageX + 'px';
          menu.style.top = (e.pageY + 20) + 'px';
          // 阻止本次 mouseup 对应的 click 事件关掉菜单
          menu._justOpened = true;
        }
      });

      document.addEventListener('click', (e) => {
        const menu = document.getElementById('highlightMenu');
        if (menu._justOpened) { menu._justOpened = false; return; }
        if (e.target.closest('#highlightMenu') || e.target.closest('#inputDialog')) return;
        menu.style.display = 'none';
        window.getSelection().removeAllRanges();
      });
    }

    async function handleHighlight(type) {
      document.getElementById('highlightMenu').style.display = 'none';

      // 书签：找到选区所在段落，切换书签后返回
      if (type === 'bookmark') {
        const para = selectedRange.startContainer.nodeType === Node.TEXT_NODE
          ? selectedRange.startContainer.parentElement.closest('p')
          : selectedRange.startContainer.closest('p');
        if (para && para.dataset.para !== undefined) {
          toggleBookmark(parseInt(para.dataset.para));
        }
        window.getSelection().removeAllRanges();
        return;
      }

      const parentPara = selectedRange.startContainer.parentElement.closest('p');
      const paragraphText = parentPara ? parentPara.textContent : '';

      // 如果选区跨越多个段落，收缩到起始段落末尾，避免 deleteContents 破坏 DOM 结构
      const startPara = selectedRange.startContainer.nodeType === Node.TEXT_NODE
        ? selectedRange.startContainer.parentElement.closest('p')
        : selectedRange.startContainer.closest('p');
      const endPara = selectedRange.endContainer.nodeType === Node.TEXT_NODE
        ? selectedRange.endContainer.parentElement.closest('p')
        : selectedRange.endContainer.closest('p');

      if (startPara && endPara && startPara !== endPara) {
        // 跨段落：只取选区内的文本，不操作 DOM，仅记录笔记
        const noteId = String(Date.now());
        const note = {
          id: noteId,
          chapterTitle: currentChapter.title,
          highlightedText: selectedText,
          contextText: paragraphText,
          aiComment: '',
          timestamp: new Date().toLocaleString('zh-CN')
        };

        if (type === 'self') {
          const comment = await showDialog('写下你的想法');
          if (comment) note.aiComment = comment;
        } else if (type === 'ai') {
          if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) { alert('请先在设置中配置 API Key'); return; }
          notes.unshift(note);
          renderNotes();
          persistNotes();
          window.getSelection().removeAllRanges();
          triggerAiComment(note);
          return;
        } else if (type === 'discuss') {
          const question = await showDialog('你想讨论什么？');
          if (question) note.aiComment = `${question}\n\n正在回复…`;
        }

        notes.unshift(note);
        renderNotes();
        persistNotes();
        window.getSelection().removeAllRanges();
        return;
      }

      // 同段落内：正常插入高亮 span
      const span = document.createElement('span');
      span.className = 'highlight';
      span.textContent = selectedText;
      span.dataset.noteId = Date.now();
      try {
        selectedRange.deleteContents();
        selectedRange.insertNode(span);
      } catch (e) {
        // 操作失败时降级为只记录笔记，不插入 DOM
        console.warn('highlight insert failed', e);
      }

      const note = {
        id: span.dataset.noteId,
        chapterTitle: currentChapter.title,
        highlightedText: selectedText,
        contextText: paragraphText,
        aiComment: '',
        timestamp: new Date().toLocaleString('zh-CN')
      };

      if (type === 'self') {
        const comment = await showDialog('写下你的想法');
        if (comment) note.aiComment = comment;
      } else if (type === 'ai') {
        if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) {
          alert('请先在设置中配置 API Key');
          return;
        }
        notes.unshift(note);
        renderNotes();
        persistNotes();
        window.getSelection().removeAllRanges();
        triggerAiComment(note);
        return;
      } else if (type === 'discuss') {
        const question = await showDialog('你想讨论什么？');
        if (question) note.aiComment = `${question}\n\n正在回复…`;
      }

      notes.unshift(note);
      renderNotes();
      persistNotes();
      window.getSelection().removeAllRanges();
    }

    function renderNotes() {
      document.getElementById('notesList').innerHTML = notes.map((note, index) => `
        <div class="note-card">
          <button class="delete-btn" onclick="deleteNote(${index})" title="删除">×</button>
          <div class="note-highlight" onclick="locateHighlight('${note.id}')" style="cursor:pointer;" title="定位到原文">"${note.highlightedText.slice(0, 80)}${note.highlightedText.length > 80 ? '…' : ''}"</div>
          ${note.aiComment ? `<div class="note-comment">${note.aiComment}</div>` : ''}
          ${note.aiComment && !note.aiComment.includes('正在') ? `<button class="menu-btn" onclick="continueDiscussion(${index})" style="margin-top:8px;padding:6px 12px;font-size:12px;">💬 继续讨论</button>` : ''}
          <div class="note-time">${note.timestamp}</div>
        </div>
      `).join('');
    }

    function locateHighlight(noteId) {
      const note = notes.find(n => n.id === noteId);
      if (!note) return;

      if (currentChapter && currentChapter.title === note.chapterTitle) {
        scrollToHighlight(noteId);
      } else {
        const chapterIdx = window.chapters.findIndex(ch => ch.title === note.chapterTitle);
        if (chapterIdx >= 0) {
          loadChapter(chapterIdx, note.chapterTitle);
          // 等待 DOM 渲染后再滚动
          setTimeout(() => scrollToHighlight(noteId), 150);
        }
      }
    }

    function scrollToHighlight(noteId) {
      const highlight = document.querySelector(`[data-note-id="${noteId}"]`);
      if (highlight) {
        highlight.scrollIntoView({ behavior: 'smooth', block: 'center' });
        highlight.style.transition = 'background 0.3s';
        const originalBg = highlight.style.background;
        highlight.style.background = 'var(--accent)';
        setTimeout(() => highlight.style.background = originalBg, 1200);
      }
    }

    function deleteNote(index) {
      if (confirm('确认删除这条笔记？')) {
        const note = notes[index];
        const highlights = document.querySelectorAll('.highlight');
        highlights.forEach(span => {
          if (span.dataset.noteId === note.id) {
            const text = document.createTextNode(span.textContent);
            span.parentNode.replaceChild(text, span);
          }
        });
        notes.splice(index, 1);
        renderNotes();
        persistNotes();
      }
    }

    async function triggerAiComment(note) {
      note.aiComment = '正在思考…';
      renderNotes();
      const text = window.chapters[currentChapter.index].text;
      const pos = text.indexOf(note.highlightedText);
      const surrounding = text.slice(Math.max(0, pos - 300), Math.min(text.length, pos + 300));
      try {
        const res = await authFetch(`${API_BASE}/api/ai/comment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            bookTitle: currentBook.name,
            chapterTitle: note.chapterTitle,
            highlightedText: note.highlightedText,
            surroundingText: surrounding,
            previousInsights: [],
            conversationHistory: [],
            userApiConfig
          })
        });
        const data = await res.json();
        note.aiComment = data.comment || data.error || 'AI 调用失败';
      } catch {
        note.aiComment = '网络错误，请重试';
      }
      renderNotes();
      persistNotes();
    }

    async function continueDiscussion(index) {
      if (!userApiConfig.cheap?.apiKey && !userApiConfig.main?.apiKey) {
        alert('请先在设置中配置 API Key');
        return;
      }

      const note = notes[index];
      const question = await showDialog('继续讨论什么？', '输入你的问题或想法');

      if (question) {
        const originalComment = note.aiComment;
        note.aiComment = originalComment + '\n\n正在思考…';
        renderNotes();

        const text = window.chapters[currentChapter.index].text;
        const pos = text.indexOf(note.highlightedText);
        const surrounding = text.slice(Math.max(0, pos - 300), Math.min(text.length, pos + 300));

        try {
          const res = await authFetch(`${API_BASE}/api/ai/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              bookTitle: currentBook.name,
              chapterTitle: note.chapterTitle,
              highlightedText: note.highlightedText,
              surroundingText: surrounding,
              previousInsights: [],
              conversationHistory: [{ role: 'assistant', content: originalComment }, { role: 'user', content: question }],
              userApiConfig
            })
          });
          const data = await res.json();
          note.aiComment = originalComment + '\n\n> ' + question + '\n\n' + (data.comment || data.error || 'AI 调用失败');
        } catch {
          note.aiComment = originalComment + '\n\n网络错误，请重试';
        }
        renderNotes();
        persistNotes();
      }
    }

    async function saveNotes() {
      if (!currentBook || notes.length === 0) { alert('暂无笔记可导出'); return; }
      const res = await authFetch(`${API_BASE}/api/notes/export`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookTitle: currentBook.name, notes })
      });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${currentBook.name}-笔记.md`; a.click();
      URL.revokeObjectURL(url);
    }

    function openExportDialog() {
      if (!currentBook || notes.length === 0) {
        alert('暂无笔记可导出');
        return;
      }
      document.getElementById('exportDialog').style.display = 'flex';
    }

    function closeExportDialog() {
      document.getElementById('exportDialog').style.display = 'none';
    }

    function exportNotes() {
      const format = document.getElementById('exportFormat').value;
      const includeContext = document.getElementById('includeContext').checked;

      let content = '';
      const bookTitle = currentBook.name;
      const timestamp = new Date().toLocaleString('zh-CN');

      if (format === 'md') {
        content = `# ${bookTitle}\n\n> 导出时间：${timestamp}\n\n`;
        notes.forEach(note => {
          content += `## ${note.chapterTitle}\n\n`;
          if (includeContext && note.contextText) {
            content += `**上下文：**\n> ...${note.contextText}...\n\n`;
          }
          content += `**划线原文：**\n> ${note.highlightedText}\n\n`;
          if (note.aiComment) {
            content += `**评论/笔记：**\n${note.aiComment.split('\n').map(line => '    ' + line).join('\n')}\n\n`;
          }
          content += `*${note.timestamp}*\n\n---\n\n`;
        });
      } else if (format === 'html') {
        content = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>${bookTitle} - 阅读笔记</title>
  <style>
    body { font-family: 'Noto Serif SC', serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.8; color: #2d3436; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    .note { margin: 30px 0; padding: 20px; background: #f9f9f9; border-left: 4px solid #0984e3; border-radius: 4px; }
    .context { color: #636e72; font-style: italic; font-size: 0.95em; margin-bottom: 12px; padding: 8px; background: #f1f2f6; border-radius: 4px; }
    .highlight { color: #d63031; font-weight: 600; margin-bottom: 15px; border-bottom: 1px dashed #d63031; display: inline-block; }
    .comment { margin-left: 30px; color: #2d3436; white-space: pre-wrap; border-left: 3px solid #dfe6e9; padding-left: 15px; margin-top: 15px; }
    .time { color: #b2bec3; font-size: 0.85em; margin-top: 15px; }
  </style>
</head>
<body>
  <h1>${bookTitle}</h1>
  <p style="color:#b2bec3;">导出时间：${timestamp}</p>
`;
        notes.forEach(note => {
          content += `  <div class="note">
    <h2>${note.chapterTitle}</h2>
    ${includeContext && note.contextText ? `<div class="context">...${note.contextText}...</div>` : ''}
    <div class="highlight">"${note.highlightedText}"</div>
    ${note.aiComment ? `<div class="comment">${note.aiComment}</div>` : ''}
    <div class="time">${note.timestamp}</div>
  </div>\n`;
        });
        content += `</body>\n</html>`;
      } else if (format === 'txt') {
        content = `${bookTitle}\n导出时间：${timestamp}\n\n${'=' .repeat(50)}\n\n`;
        notes.forEach(note => {
          content += `${note.chapterTitle}\n\n`;
          if (includeContext && note.contextText) {
            content += `[上下文]：...${note.contextText}...\n\n`;
          }
          content += `[划线原文]：${note.highlightedText}\n\n`;
          if (note.aiComment) {
            content += `[评论/笔记]：\n${note.aiComment.split('\n').map(line => '    ' + line).join('\n')}\n\n`;
          }
          content += `时间：${note.timestamp}\n\n${'-' .repeat(50)}\n\n`;
        });
      }

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${bookTitle}-笔记.${format}`;
      a.click();
      URL.revokeObjectURL(url);
      closeExportDialog();
    }

    function logout() {
      localStorage.removeItem('authToken');
      authToken = null;
      document.getElementById('authOverlay').style.display = 'flex';
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }

    applyReadingSettings();
    if (authToken) {
      loadProgress().then(loadBooks);
    } else {
      document.getElementById('authOverlay').style.display = 'flex';
    }
  </script>
</body>
</html>
